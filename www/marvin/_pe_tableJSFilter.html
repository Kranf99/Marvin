<script>
function clearFilter() 
{
    document.getElementById('filterInput1').value = '';
    document.getElementById('filterInput2').value = '';
    document.getElementById('filterInput3').value = '';
    document.getElementById('filterForm').submit();
}

function initScriptFilters()
{
    let typingTimer;
    const doneTypingInterval = 800; // milliseconds
    const filterInput1 = document.getElementById('filterInput1');
    const filterInput2 = document.getElementById('filterInput2');
    const filterInput3 = document.getElementById('filterInput3');
    filterInput1.addEventListener('keyup', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() {
            document.getElementById('filterForm').submit();
        }, doneTypingInterval);
    });
    filterInput1.addEventListener('keypress',function(e) {
        if (e.key === 'Enter')
        {
            clearTimeout(typingTimer);
            document.getElementById('filterForm').submit();
        }
    });
    filterInput2.addEventListener('keyup', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() {
            document.getElementById('filterForm').submit();
        }, doneTypingInterval);
    });

    filterInput2.addEventListener('keypress',function(e) {
        if (e.key === 'Enter')
        {
            clearTimeout(typingTimer);
            document.getElementById('filterForm').submit();
        }
    });
    filterInput3.addEventListener('keyup', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function() {
            document.getElementById('filterForm').submit();
        }, doneTypingInterval);
    });
    
    filterInput3.addEventListener('keypress',function(e) {
        if (e.key === 'Enter')
        {
            clearTimeout(typingTimer);
            document.getElementById('filterForm').submit();
        }
    });
    
    const el=document.getElementById("defaultTab");
    if (el) el.click();
    // Add listener for changes
    if (handleMobileView)
    {
        mediaQuery.addListener(handleMobileView);
        handleMobileView(mediaQuery);
    }
}
initScriptFilters();
</script>
